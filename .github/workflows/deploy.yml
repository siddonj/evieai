# Build, push, and deploy EvieAI to Azure Container Apps + Static Web App
# Trigger: push to main that changes orchestrator/, mcp_servers/, or web_ui/

name: Deploy EvieAI

on:
  push:
    branches: [main]
    paths:
      - orchestrator/**
      - mcp_servers/**
      - web_ui/**
      - .github/workflows/deploy.yml

  workflow_dispatch:

permissions:
  contents: read
  id-token: write
env:
  ACR_SERVER: aiagent2acrdev.azurecr.io
  RESOURCE_GROUP: rg-aiagent2-dev
  ORCHESTRATOR_APP: aiagent2-orchestrator-dev

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff mypy fastapi pydantic httpx openai msal
      - run: ruff check .
      - run: mypy --ignore-missing-imports mcp_servers/*/app/ || true

  build:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - name: Validate Azure credentials JSON
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS }}' | python3 -c "
          import json, sys
          try:
            d = json.load(sys.stdin)
            for k in ('clientId','clientSecret','tenantId','subscriptionId'):
              v = d.get(k)
              if not v or not isinstance(v, str):
                print(f'MISSING or invalid: {k}'); sys.exit(1)
            print('AZURE_CREDENTIALS JSON is valid')
          except Exception as e:
            print(f'Invalid JSON in AZURE_CREDENTIALS: {e}'); sys.exit(1)
          "
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}
      - run: az acr login --name aiagent2acrdev

      - name: Build orchestrator
        run: |
          docker build -t $ACR_SERVER/orchestrator:latest \
            -f orchestrator/Dockerfile .
          docker push $ACR_SERVER/orchestrator:latest

      - name: Build MCP images
        run: |
          declare -A MCP_DOCKERFILES=(
            ["file-share"]=mcp_servers/file_share/Dockerfile
            ["mail"]=mcp_servers/o365_mail/Dockerfile
            ["onedrive"]=mcp_servers/onedrive/Dockerfile
            ["sql"]=mcp_servers/sql/Dockerfile
            ["kb"]=mcp_servers/knowledge_base/Dockerfile
            ["memory"]=mcp_servers/memory/Dockerfile
            ["doc"]=mcp_servers/document_generation/Dockerfile
            ["analytics"]=mcp_servers/analytics/Dockerfile
          )
          declare -A MCP_CONTEXTS=(
            ["file-share"]="."
            ["mail"]="."
            ["onedrive"]="."
            ["sql"]="mcp_servers/sql"
            ["kb"]="mcp_servers/knowledge_base"
            ["memory"]="mcp_servers/memory"
            ["doc"]="mcp_servers/document_generation"
            ["analytics"]="mcp_servers/analytics"
          )
          for name in "${!MCP_DOCKERFILES[@]}"; do
            docker build -t $ACR_SERVER/${name}:latest \
              -f "${MCP_DOCKERFILES[$name]}" \
              "${MCP_CONTEXTS[$name]}"
            docker push $ACR_SERVER/${name}:latest
          done

      - name: Build Web UI
        run: |
          cd web_ui
          npm ci
          npm run build

      - name: Upload Web UI artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-ui-dist
          path: web_ui/dist

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4
      - name: Validate Azure credentials JSON
        run: |
          echo '${{ secrets.AZURE_CREDENTIALS }}' | python3 -c "
          import json, sys
          try:
            d = json.load(sys.stdin)
            for k in ('clientId','clientSecret','tenantId','subscriptionId'):
              v = d.get(k)
              if not v or not isinstance(v, str):
                print(f'MISSING or invalid: {k}'); sys.exit(1)
            print('AZURE_CREDENTIALS JSON is valid')
          except Exception as e:
            print(f'Invalid JSON in AZURE_CREDENTIALS: {e}'); sys.exit(1)
          "
      - uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy orchestrator
        run: |
          EXISTING_JWT=$(az containerapp show \
            --name $ORCHESTRATOR_APP \
            --resource-group $RESOURCE_GROUP \
            --query "properties.template.containers[0].env[?name=='JWT_SECRET'].value" \
            -o tsv 2>/dev/null || echo "")
          JWT_SECRET="${EXISTING_JWT:-$(openssl rand -hex 32)}"

          az containerapp update \
            --name $ORCHESTRATOR_APP \
            --resource-group $RESOURCE_GROUP \
            --image $ACR_SERVER/orchestrator:latest \
            --set-env-vars \
              "JWT_SECRET=$JWT_SECRET" \
              "AUTH_DB_PATH=/tmp/evieai_auth.db" \
              "DEFAULT_ADMIN_EMAIL=admin@evieai.local" \
              "DEFAULT_ADMIN_PASSWORD=admin"

      - name: Deploy MCP servers
        run: |
          declare -A CA_NAMES=(
            ["file-share"]="aiagent2-mcp-files-dev"
            ["mail"]="aiagent2-mcp-mail-dev"
            ["onedrive"]="aiagent2-mcp-onedrive-dev"
            ["sql"]="aiagent2-mcp-sql-dev"
            ["kb"]="aiagent2-mcp-kb-dev"
            ["memory"]="aiagent2-mcp-memory-dev"
            ["doc"]="aiagent2-mcp-doc-dev"
            ["analytics"]="aiagent2-mcp-analytics-dev"
          )
          for svc in "${!CA_NAMES[@]}"; do
            az containerapp update \
              --name "${CA_NAMES[$svc]}" \
              --resource-group $RESOURCE_GROUP \
              --image "$ACR_SERVER/${svc}:latest" &
          done
          wait

      - name: Download Web UI artifact
        uses: actions/download-artifact@v4
        with:
          name: web-ui-dist
          path: web_ui/dist

      - name: Deploy Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.SWA_TOKEN }}
          app_location: web_ui/dist
          skip_app_build: true
          action: upload
