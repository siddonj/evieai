services:
  # ─── Infrastructure ──────────────────────────────────────────────

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: ${DB_PASSWORD:-DevP@ssw0rd!}
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "${DB_PASSWORD:-DevP@ssw0rd!}" -C -Q "SELECT 1"
      interval: 5s
      retries: 20
      start_period: 30s
    volumes:
      - sqlserver-data:/var/opt/mssql

  dab:
    image: mcr.microsoft.com/azure-databases/data-api-builder:latest
    environment:
      DATABASE_CONNECTION_STRING: Server=sqlserver;Database=aiagent2;User Id=sa;Password=${DB_PASSWORD:-DevP@ssw0rd!};TrustServerCertificate=true;
    ports:
      - "5000:5000"
    volumes:
      - ./mcp_servers/sql/dab-config.json:/App/dab-config.json:ro
    depends_on:
      sqlserver:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-evieai}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-evieai}"]
      interval: 5s
      retries: 20
      start_period: 20s
    volumes:
      - postgres-data:/var/lib/postgresql/data

  # ─── MCP Servers ─────────────────────────────────────────────────

  files-mcp:
    build:
      context: .
      dockerfile: mcp_servers/file_share/Dockerfile
    environment:
      LOCAL_SHARE_ROOT: ${LOCAL_SHARE_ROOT:-/tmp/files}
    ports:
      - "8001:8001"
    volumes:
      - files-data:/tmp/files
    healthcheck:
      test: curl -sf http://localhost:8001/health || exit 1
      interval: 10s
      retries: 3

  mail-mcp:
    build:
      context: .
      dockerfile: mcp_servers/o365_mail/Dockerfile
    environment:
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_USER_ID: ${AZURE_USER_ID:-}
    ports:
      - "8002:8002"
    healthcheck:
      test: curl -sf http://localhost:8002/health || exit 1
      interval: 10s
      retries: 3

  onedrive-mcp:
    build:
      context: .
      dockerfile: mcp_servers/onedrive/Dockerfile
    environment:
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      AZURE_USER_ID: ${AZURE_USER_ID:-}
    ports:
      - "8003:8003"
    healthcheck:
      test: curl -sf http://localhost:8003/health || exit 1
      interval: 10s
      retries: 3

  sql-mcp:
    build:
      context: mcp_servers/sql
      dockerfile: Dockerfile
    environment:
      DAB_BASE_URL: http://dab:5000
    ports:
      - "8008:8004"
    depends_on:
      - dab
    healthcheck:
      test: curl -sf http://localhost:8004/health || exit 1
      interval: 10s
      retries: 3

  postgresql-mcp:
    build:
      context: mcp_servers/postgresql
      dockerfile: Dockerfile
    environment:
      POSTGRES_DSN: ${POSTGRES_DSN:-postgresql://postgres:postgres@postgres:5432/evieai}
      POSTGRES_MAX_ROWS: ${POSTGRES_MAX_ROWS:-200}
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: curl -sf http://localhost:8010/health || exit 1
      interval: 10s
      retries: 3

  memory-mcp:
    build:
      context: mcp_servers/memory
      dockerfile: Dockerfile
    ports:
      - "8004:8004"
    healthcheck:
      test: curl -sf http://localhost:8004/health || exit 1
      interval: 10s
      retries: 3

  kb-mcp:
    build:
      context: mcp_servers/knowledge_base
      dockerfile: Dockerfile
    ports:
      - "8005:8005"
    healthcheck:
      test: curl -sf http://localhost:8005/health || exit 1
      interval: 10s
      retries: 3

  doc-mcp:
    build:
      context: mcp_servers/document_generation
      dockerfile: Dockerfile
    ports:
      - "8006:8006"
    healthcheck:
      test: curl -sf http://localhost:8006/health || exit 1
      interval: 10s
      retries: 3

  analytics-mcp:
    build:
      context: mcp_servers/analytics
      dockerfile: Dockerfile
    ports:
      - "8007:8007"
    healthcheck:
      test: curl -sf http://localhost:8007/health || exit 1
      interval: 10s
      retries: 3

  dashboard-mcp:
    build:
      context: mcp_servers/dashboard
      dockerfile: Dockerfile
    ports:
      - "8009:8009"
    healthcheck:
      test: curl -sf http://localhost:8009/health || exit 1
      interval: 10s
      retries: 3

  context-forge:
    image: ghcr.io/ibm/mcp-context-forge:latest
    environment:
      PORT: 8100
    ports:
      - "8100:8100"
    depends_on:
      files-mcp:
        condition: service_healthy
      sql-mcp:
        condition: service_healthy
      postgresql-mcp:
        condition: service_healthy
      memory-mcp:
        condition: service_healthy
      kb-mcp:
        condition: service_healthy
      doc-mcp:
        condition: service_healthy
      analytics-mcp:
        condition: service_healthy
      dashboard-mcp:
        condition: service_healthy
    healthcheck:
      test: curl -sf http://localhost:8100/health || exit 1
      interval: 10s
      retries: 3

  # ─── Orchestrator ────────────────────────────────────────────────

  orchestrator:
    build:
      context: .
      dockerfile: orchestrator/Dockerfile
    environment:
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      AZURE_OPENAI_ENDPOINT: ${AZURE_OPENAI_ENDPOINT}
      AZURE_OPENAI_API_KEY: ${AZURE_OPENAI_API_KEY}
      AZURE_OPENAI_DEPLOYMENT: ${AZURE_OPENAI_DEPLOYMENT:-gpt-4o}
      MCP_FILES_URL: http://files-mcp:8001/mcp
      MCP_MAIL_URL: http://mail-mcp:8002/mcp
      MCP_ONEDRIVE_URL: http://onedrive-mcp:8003/mcp
      MCP_MEMORY_URL: http://memory-mcp:8004/mcp
      MCP_SQL_URL: http://sql-mcp:8004/mcp
      MCP_POSTGRESQL_URL: http://postgresql-mcp:8010/mcp
      MCP_KB_URL: http://kb-mcp:8005/mcp
      MCP_DOC_URL: http://doc-mcp:8006/mcp
      MCP_ANALYTICS_URL: http://analytics-mcp:8007/mcp
      MCP_DASHBOARD_URL: http://dashboard-mcp:8009/mcp
      CONTEXT_FORGE_ENABLED: ${CONTEXT_FORGE_ENABLED:-false}
      CONTEXT_FORGE_BASE_URL: ${CONTEXT_FORGE_BASE_URL:-http://context-forge:8100}
      CONTEXT_FORGE_API_KEY: ${CONTEXT_FORGE_API_KEY:-}
      CONTEXT_FORGE_TIMEOUT_SECONDS: ${CONTEXT_FORGE_TIMEOUT_SECONDS:-10}
      CONTEXT_FORGE_FALLBACK_MODE: ${CONTEXT_FORGE_FALLBACK_MODE:-mcp}
      CONTEXT_FORGE_CACHE_ENABLED: ${CONTEXT_FORGE_CACHE_ENABLED:-true}
      PROJECT_NAME: ${PROJECT_NAME:-aiagent2}
      ENVIRONMENT: ${ENVIRONMENT:-dev}
      RESOURCE_GROUP: ${RESOURCE_GROUP:-rg-aiagent2-dev}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
    ports:
      - "8000:8000"
    depends_on:
      files-mcp:
        condition: service_healthy
      sql-mcp:
        condition: service_healthy
      postgresql-mcp:
        condition: service_healthy
      memory-mcp:
        condition: service_healthy
      kb-mcp:
        condition: service_healthy
      doc-mcp:
        condition: service_healthy
      analytics-mcp:
        condition: service_healthy
      dashboard-mcp:
        condition: service_healthy
      context-forge:
        condition: service_healthy
    healthcheck:
      test: curl -sf http://localhost:8000/health || exit 1
      interval: 10s
      retries: 3

  # ─── Web UI (dev server with hot reload) ─────────────────────────

  web-ui:
    build:
      context: web_ui
      dockerfile_inline: |
        FROM node:20-alpine
        WORKDIR /app
        COPY package*.json ./
        RUN npm install
        COPY . .
        ENV VITE_ORCHESTRATOR_URL=http://localhost:8000
        EXPOSE 5173
        CMD ["npm", "run", "dev", "--", "--host", "0.0.0.0"]
    ports:
      - "5173:5173"
    volumes:
      - ./web_ui/src:/app/src:ro
    depends_on:
      - orchestrator

volumes:
  sqlserver-data:
  postgres-data:
  files-data:
